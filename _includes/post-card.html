<article class="post-card">
  <h2 class="post-card__title">
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
  </h2>
  
  <div class="post-card__meta">
    <time class="post-card__date" datetime="{{ post.date | date_to_xmlschema }}">
      {{ post.date | date: "%Y년 %m월 %d일" }}
    </time>
    {% if post.categories %}
      <span class="post-card__category">{{ post.categories | first }}</span>
    {% endif %}
  </div>
  
  <div class="post-card__excerpt">
    {% if post.excerpt %}
      {{ post.excerpt | strip_html | truncate: 100 }}
    {% endif %}
  </div>
</article>

<style>
.post-card {
  padding: 1.5rem 0;
  border-bottom: 1px solid var(--border-color);
}

.post-card:last-child {
  border-bottom: none;
}

.post-card__title {
  font-size: 1.25rem;
  margin: 0;
  line-height: 1.4;
}

.post-card__title a {
  color: var(--text-color);
  text-decoration: none;
  transition: color 0.2s ease;
}

.post-card__title a:hover {
  color: var(--primary-color);
}

.post-card__meta {
  margin: 0.5rem 0;
  font-size: 0.9rem;
  color: #6a737d;
  display: flex;
  gap: 1rem;
  align-items: center;
}

.post-card__category {
  color: var(--primary-color);
}

.post-card__excerpt {
  margin: 0.5rem 0 0 0;
  color: #6a737d;
  font-size: 0.95rem;
  line-height: 1.5;
}

@media (max-width: 768px) {
  .post-card__title {
    font-size: 1.1rem;
  }

  .post-card__excerpt {
    font-size: 0.9rem;
  }
}
</style>
