<header class="site-header" role="banner">
  <div class="wrapper">
    <div class="site-header-inner">
      <a class="site-title" href="{{ "/" | relative_url }}">
        {% if site.logo %}
          <img class="site-logo" src="{{ site.logo | relative_url }}" alt="{{ site.title | escape }}">
        {% else %}
          {{ site.title | escape }}
        {% endif %}
      </a>

      <nav class="site-nav">
        <input type="checkbox" id="nav-trigger" class="nav-trigger" />
        <label for="nav-trigger">
          <span class="menu-icon">
            <svg viewBox="0 0 18 15" width="18px" height="15px">
              <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.032C17.335,0,18,0.665,18,1.484L18,1.484z M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516L18,7.516z M18,13.516C18,14.335,17.335,15,16.516,15H1.484 C0.665,15,0,14.335,0,13.516l0,0c0-0.82,0.665-1.483,1.484-1.483h15.032C17.335,12.031,18,12.695,18,13.516L18,13.516z"/>
            </svg>
          </span>
        </label>

        <div class="trigger">
          <div class="nav-links">
            {% for item in site.navigation_header %}
              {% if item.url contains "://" %}
                {% assign url = item.url %}
              {% else %}
                {% assign url = item.url | relative_url %}
              {% endif %}
              <a class="page-link {% if page.url == item.url %}current{% endif %}" href="{{ url }}">{{ item.title }}</a>
            {% endfor %}
          </div>
          
          <div class="theme-toggle">
            <button id="theme-toggle" aria-label="Toggle Dark Mode">
              <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
              </svg>
              <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </button>
          </div>
        </div>
      </nav>
    </div>
  </div>
</header>

<style>
  .site-header {
    border-top: 5px solid #0366d6;
    border-bottom: 1px solid #e1e4e8;
    min-height: 56px;
    background-color: white;
    position: relative;
  }
  
  .wrapper {
    max-width: 1200px;
    margin-right: auto;
    margin-left: auto;
    padding-right: 30px;
    padding-left: 30px;
  }
  
  .site-header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .site-title {
    font-size: 1.625em;
    font-weight: 600;
    line-height: 56px;
    letter-spacing: -1px;
    margin-bottom: 0;
    color: #24292e;
    text-decoration: none;
  }
  
  .site-logo {
    max-height: 40px;
    vertical-align: middle;
  }
  
  .site-nav {
    display: flex;
    align-items: center;
  }
  
  .nav-trigger {
    display: none;
  }
  
  .menu-icon {
    display: none;
  }
  
  .page-link {
    color: #24292e;
    line-height: 1.5;
    margin-right: 20px;
    text-decoration: none;
  }
  
  .page-link:hover {
    color: #0366d6;
  }
  
  .page-link.current {
    color: #0366d6;
    font-weight: 600;
  }
  
  .trigger {
    display: flex;
    align-items: center;
  }
  
  @media screen and (max-width: 600px) {
    .site-nav {
      position: absolute;
      top: 9px;
      right: 15px;
      background-color: white;
      border: 1px solid #e1e4e8;
      border-radius: 5px;
      text-align: right;
      z-index: 10;
    }
    
    .site-nav .menu-icon {
      display: block;
      float: right;
      width: 36px;
      height: 26px;
      line-height: 0;
      padding-top: 10px;
      text-align: center;
      cursor: pointer;
    }
    
    .site-nav .menu-icon > svg {
      fill: #24292e;
    }
    
    .site-nav .trigger {
      clear: both;
      display: none;
      flex-direction: column;
      align-items: flex-start;
      padding: 5px 10px;
    }
    
    .site-nav:hover .trigger,
    .nav-trigger:checked ~ .trigger {
      display: flex;
    }
    
    .site-nav .page-link {
      display: block;
      padding: 5px 10px;
      margin-left: 20px;
      margin-right: 0;
    }
    
    .site-nav .page-link:not(:last-child) {
      margin-right: 0;
    }
  }
  
  /* Theme toggle styling */
  .theme-toggle button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .theme-toggle button:hover {
    background-color: rgba(0, 0, 0, 0.1);
  }
  
  .sun-icon {
    display: inline-block;
  }
  
  .moon-icon {
    display: none;
  }
  
  body.dark-theme .site-header {
    background-color: #24292e;
    border-bottom-color: #444c56;
  }
  
  body.dark-theme .site-title,
  body.dark-theme .page-link {
    color: #e4e4e4;
  }
  
  body.dark-theme .page-link:hover,
  body.dark-theme .page-link.current {
    color: #58a6ff;
  }
  
  body.dark-theme .site-nav .menu-icon > svg {
    fill: #e4e4e4;
  }
  
  body.dark-theme .site-nav {
    background-color: #24292e;
    border-color: #444c56;
  }
  
  body.dark-theme .theme-toggle button:hover {
    background-color: rgba(255, 255, 255, 0.1);
  }
  
  body.dark-theme .sun-icon {
    display: none;
  }
  
  body.dark-theme .moon-icon {
    display: inline-block;
  }
</style>
