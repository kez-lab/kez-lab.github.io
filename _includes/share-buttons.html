<div class="share-buttons">
  <span class="share-title">Share this post:</span>
  
  <!-- Twitter -->
  <a class="share-button twitter" href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ page.url | absolute_url | url_encode }}&via={{ site.twitter_username }}" target="_blank" rel="noopener" aria-label="Share on Twitter">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path>
    </svg>
    <span>Twitter</span>
  </a>
  
  <!-- Facebook -->
  <a class="share-button facebook" href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener" aria-label="Share on Facebook">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
    </svg>
    <span>Facebook</span>
  </a>
  
  <!-- LinkedIn -->
  <a class="share-button linkedin" href="https://www.linkedin.com/shareArticle?mini=true&url={{ page.url | absolute_url | url_encode }}&title={{ page.title | url_encode }}&summary={{ page.description | url_encode }}&source={{ site.title | url_encode }}" target="_blank" rel="noopener" aria-label="Share on LinkedIn">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
      <rect x="2" y="9" width="4" height="12"></rect>
      <circle cx="4" cy="4" r="2"></circle>
    </svg>
    <span>LinkedIn</span>
  </a>
  
  <!-- Email -->
  <a class="share-button email" href="mailto:?subject={{ page.title | url_encode }}&body=Check out this article: {{ page.url | absolute_url | url_encode }}" aria-label="Share via Email">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
      <polyline points="22,6 12,13 2,6"></polyline>
    </svg>
    <span>Email</span>
  </a>
</div>

<style>
  .share-buttons {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    margin: 2rem 0;
  }
  
  .share-title {
    margin-right: 1rem;
    font-weight: 500;
    margin-bottom: 0.5rem;
  }
  
  .share-button {
    display: inline-flex;
    align-items: center;
    margin-right: 0.75rem;
    margin-bottom: 0.5rem;
    padding: 0.5rem 0.75rem;
    border-radius: 4px;
    color: white;
    text-decoration: none;
    transition: background-color 0.2s ease;
  }
  
  .share-button svg {
    margin-right: 0.5rem;
  }
  
  .share-button.twitter {
    background-color: #1da1f2;
  }
  
  .share-button.facebook {
    background-color: #1877f2;
  }
  
  .share-button.linkedin {
    background-color: #0077b5;
  }
  
  .share-button.email {
    background-color: #555;
  }
  
  .share-button:hover {
    opacity: 0.9;
    text-decoration: none;
  }
  
  @media (max-width: 600px) {
    .share-buttons {
      flex-direction: column;
      align-items: flex-start;
    }
    
    .share-button {
      margin-right: 0;
      width: 100%;
      justify-content: center;
    }
  }
</style>
