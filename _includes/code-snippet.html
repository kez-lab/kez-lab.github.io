{% if include.language %}
<div class="code-snippet">
  <div class="code-header">
    {% if include.filename %}
      <span class="filename">{{ include.filename }}</span>
    {% endif %}
    <span class="language-label">{{ include.language }}</span>
  </div>
  
  {% highlight {{include.language}} %}
  {{ include.code }}
  {% endhighlight %}
</div>
{% else %}
<div class="code-snippet">
  <pre><code>{{ include.code }}</code></pre>
</div>
{% endif %}
