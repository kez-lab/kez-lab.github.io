---
layout: default
title: Home
---

<div class="home">
  <section class="hero">
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
  </section>

  <section class="posts">
    <h2>Latest Posts</h2>
    <ul>
      {% for post in site.posts %}
        <li>
          <a href="{{ post.url }}">{{ post.title }}</a>
          <span>{{ post.date | date: "%B %d, %Y" }}</span>
        </li>
      {% endfor %}
    </ul>
  </section>
</div>

<style>
  .hero {
    text-align: center;
    padding: 4rem 1rem;
    margin-bottom: 2rem;
    background: linear-gradient(135deg, #0366d6, #034ea4);
    color: white;
    border-radius: 8px;
  }
  
  .hero h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }
  
  .hero p {
    font-size: 1.2rem;
    max-width: 600px;
    margin: 0 auto;
  }
  
  .posts h2 {
    margin-bottom: 1.5rem;
    font-size: 1.8rem;
  }
  
  .post-item {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid #e1e4e8;
  }
  
  .post-item h3 {
    margin-top: 0;
    margin-bottom: 0.5rem;
    font-size: 1.5rem;
  }
  
  .post-meta {
    margin-bottom: 1rem;
    font-size: 0.9em;
    color: #6a737d;
  }
  
  .post-categories {
    margin-left: 1rem;
  }
  
  .post-excerpt {
    margin-bottom: 1rem;
  }
  
  .read-more {
    font-weight: 500;
  }
  
  .all-posts {
    margin-top: 2rem;
    text-align: center;
  }
  
  .btn {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    background-color: #0366d6;
    color: white;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 500;
  }
  
  .btn:hover {
    background-color: #024ea4;
    color: white;
    text-decoration: none;
  }
</style>
