# Site settings
title: Kez Development Lab
description: A technical blog about software development
baseurl: ""
url: ""

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/
timezone: Asia/Seoul

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-mentions
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-include-cache
  - jemoji

# Pagination
paginate: 6
paginate_path: /blog/page:num/

# Collections
collections:
  posts:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page

# Custom variables
author: Kez Lab
email: your-email@example.com
github_username: kez-lab
twitter_username: kezlab
date_format: "%Y-%m-%d"

# Navigation
navigation_header:
  - title: Home
    url: /
  - title: Blog
    url: /blog/
  - title: Categories
    url: /categories/
  - title: Tags
    url: /tags/
  - title: About
    url: /about/
  - title: Search
    url: /search/
